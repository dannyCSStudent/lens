

services:
  db:
    image: postgres:16
    container_name: lens-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: lens-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: lens-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./apps/api:/app
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/lens
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: lens-web
    command: pnpm dev
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
